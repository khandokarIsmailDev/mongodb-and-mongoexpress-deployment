apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-express 
  labels:
    app: mongo-express
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-express
  template:
    metadata:
      labels:
        app: mongo-express
    spec:
      containers:
      - name: mongo-express
        image: mongo-express
        ports: 
        - containerPort: 8081
        env:
        - name: ME_CONFIG_MONGODB_SERVER #name-convention from docker mongo-express image docs
          valueFrom:
            configMapKeyRef:
              name: mongodb-configmap  
              key: database-url
        - name: ME_CONFIG_MONGODB_ADMINUSERNAME #name-convention from docker mongo-express image docs
          valueFrom:
            secretKeyRef:
              name: mongodb-secret 
              key: mongo-root-username
        - name: ME_CONFIG_MONGODB_ADMINPASSWORD #name-convention from docker mongo-express image docs
          valueFrom:
            secretKeyRef:
              name: mongodb-secret  
              key: mongo-root-password

---
# Service file below here
# now create a service for mongodb : we can create both deployment and service in one file; just separetor which is "---"
apiVersion: v1
kind: Service 
metadata:
  name: mongo-express-service
spec:
  selector:
    app: mongo-express
  type: LoadBalancer 
  ports:
  - protocol: TCP 
    port: 8081  
    targetPort: 8081
    nodePort: 30000 # nodePort is a port that is exposed on each node in the cluster
 